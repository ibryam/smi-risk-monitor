name: Daily SMI Ingestion

on:
  schedule:
    - cron: "0 17 * * 1-5"  # 17:00 UTC = 19:00 CEST, Mon–Fri after SIX closes (17:30 CEST)
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: ingestion/requirements.txt

      - name: Install dependencies
        run: pip install -r ingestion/requirements.txt

      - name: Write GCP credentials
        run: echo '${{ secrets.GCP_SA_KEY }}' > /tmp/sa_key.json

      - name: Run ingestion — SMI stocks + benchmarks
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa_key.json
        run: python ingestion/ingest_smi.py

      - name: Install dbt dependencies
        run: pip install dbt-bigquery==1.9.0

      - name: Install dbt packages
        working-directory: dbt
        run: dbt deps

      - name: Write dbt profiles
        run: cp dbt/profiles.ci.yml dbt/profiles.yml

      - name: Run dbt seed
        working-directory: dbt
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa_key.json
        run: dbt seed --profiles-dir .

      - name: Run dbt models
        working-directory: dbt
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa_key.json
        run: dbt run --profiles-dir .

      - name: Run dbt tests
        working-directory: dbt
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa_key.json
        run: dbt test --profiles-dir .

      - name: Clean up credentials
        if: always()
        run: rm -f /tmp/sa_key.json
