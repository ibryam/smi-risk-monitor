version: 2

models:
  - name: int_smi__daily_returns
    description: >
      How much did each stock go up or down each day?
      This table calculates the daily percentage change for every SMI stock.
      For example: if Nestlé closed at 98 CHF yesterday and 100 CHF today,
      the return is +2.04%.
      These daily changes are the starting point for all risk calculations.

    columns:
      - name: date
        tests: [not_null]
      - name: ticker
        tests: [not_null]
      - name: daily_return_pct
        description: Percentage change vs the previous trading day (e.g. 2.04 means +2.04%)
        tests: [not_null]
      - name: log_return_pct
        description: >
          A different way to measure the same daily change.
          Used in risk calculations because it works better with statistics.

  - name: int_smi__rolling_metrics
    description: >
      Risk and trend numbers for each SMI stock, updated every day.

      Volatility shows how much a stock's price moves around day to day.
      A stock with 40% volatility swings a lot and carries more risk.
      Swiss blue chips like Nestlé typically sit around 15-20%.

      Moving averages smooth out the daily noise to show the general price trend.
      When the 30-day average rises above the 90-day average, traders call this
      a "golden cross" — a sign that momentum is turning positive.

      Drawdown shows how far a stock has dropped from its recent high.
      For example, -15% means the stock is 15% below its best price in the last year.

    columns:
      - name: date
        tests: [not_null]
      - name: ticker
        tests: [not_null]
      - name: volatility_30d
        description: >
          How much the stock price moved over the last 30 trading days.
          Shown as an annual percentage (e.g. 20 means 20% per year).
          Higher = more risk.
      - name: volatility_90d
        description: Same as volatility_30d but measured over 90 trading days
      - name: sma_30d
        description: Average closing price over the last 30 trading days
      - name: sma_90d
        description: Average closing price over the last 90 trading days
      - name: drawdown_from_52w_high_pct
        description: >
          How far the current price is below the highest price of the last 52 weeks.
          Always zero or negative. For example -15 means the stock is 15% below its yearly peak.
