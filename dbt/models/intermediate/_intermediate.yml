version: 2

models:
  - name: int_smi__daily_returns
    description: >
      Daily simple and log returns per SMI constituent, calculated from closing prices.
      Log returns are preferred for statistical analysis as they are additive and
      approximately normally distributed. First row per ticker is excluded (no prior
      day available).

    columns:
      - name: date
        tests: [not_null]
      - name: ticker
        tests: [not_null]
      - name: daily_return_pct
        description: Simple percentage return vs prior trading day close
        tests: [not_null]
      - name: log_return_pct
        description: Continuous (log) return vs prior trading day close

  - name: int_smi__rolling_metrics
    description: >
      Rolling risk and trend metrics per SMI constituent. Includes annualised
      volatility over 30/60/90-day windows, simple moving averages (30d, 90d),
      52-week rolling high, and drawdown from that high.
      Volatility is annualised using sqrt(252) — the standard convention for
      daily equity data assuming 252 trading days per year.

    columns:
      - name: date
        tests: [not_null]
      - name: ticker
        tests: [not_null]
      - name: volatility_30d
        description: Annualised volatility of log returns over trailing 30 trading days
      - name: volatility_90d
        description: Annualised volatility of log returns over trailing 90 trading days
      - name: sma_30d
        description: 30-day simple moving average of closing price
      - name: sma_90d
        description: 90-day simple moving average of closing price
      - name: drawdown_from_52w_high_pct
        description: Percentage decline from the 52-week rolling high (always <= 0)
