version: 2

models:
  - name: int_smi__daily_returns
    description: >
      How much did each stock gain or lose each day?
      This model calculates the daily percentage change in closing price for every
      SMI company. For example, if Nestlé closed at 98 CHF yesterday and 100 CHF
      today, the daily return is +2.04%. These return figures are the foundation
      for all risk calculations downstream.

    columns:
      - name: date
        tests: [not_null]
      - name: ticker
        tests: [not_null]
      - name: daily_return_pct
        description: Percentage gain or loss vs the previous trading day
        tests: [not_null]
      - name: log_return_pct
        description: >
          Logarithmic return — a mathematically preferred way to measure returns
          when comparing across different time periods or running statistical analysis

  - name: int_smi__rolling_metrics
    description: >
      Risk and trend indicators for each SMI stock, recalculated every day.

      Volatility measures how much a stock's price swings day-to-day. A stock with
      high volatility (e.g. 40%) moves dramatically and carries more risk. Swiss blue
      chips like Nestlé typically show lower volatility (15-20%) than smaller stocks.

      Moving averages smooth out daily noise to show the underlying price trend.
      When the 30-day average crosses above the 90-day average, it often signals
      positive momentum (known as a "golden cross" in finance).

      Drawdown shows how far a stock has fallen from its recent peak — a key measure
      of downside risk used by portfolio managers at Swiss banks and asset managers.

    columns:
      - name: date
        tests: [not_null]
      - name: ticker
        tests: [not_null]
      - name: volatility_30d
        description: >
          Annualised price volatility over the last 30 trading days.
          Higher = more risk. Expressed as a percentage (e.g. 20 = 20% annual volatility).
      - name: volatility_90d
        description: Annualised price volatility over the last 90 trading days
      - name: sma_30d
        description: Average closing price over the last 30 trading days
      - name: sma_90d
        description: Average closing price over the last 90 trading days
      - name: drawdown_from_52w_high_pct
        description: >
          How far the current price is below the highest price of the last 52 weeks.
          Always zero or negative — e.g. -15 means the stock is 15% below its yearly peak.
