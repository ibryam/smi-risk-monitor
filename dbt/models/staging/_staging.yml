version: 2

models:
  - name: stg_smi__daily_prices
    description: >
      Daily stock prices for all 20 companies in the Swiss Market Index (SMI).
      Each row represents one company on one trading day, with the opening price,
      closing price, highest and lowest price of the day, and number of shares traded.
      Data is sourced from Yahoo Finance and refreshed every weekday morning.
      Invalid rows (missing or zero prices) are removed at this stage.

    columns:
      - name: date
        description: The trading date
        tests:
          - not_null

      - name: ticker
        description: Stock ticker symbol used by Yahoo Finance (e.g. NESN.SW for Nestlé)
        tests:
          - not_null

      - name: company_name
        description: Company name (e.g. Nestlé, UBS, Roche)
        tests:
          - not_null

      - name: open_price
        description: Price at market open in CHF
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              strictly: true

      - name: high_price
        description: Highest traded price during the day in CHF
        tests:
          - not_null

      - name: low_price
        description: Lowest traded price during the day in CHF
        tests:
          - not_null

      - name: close_price
        description: Final traded price at market close in CHF
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              strictly: true

      - name: volume
        description: Total number of shares traded during the day
        tests:
          - not_null

      - name: ingested_at
        description: Timestamp of when this record was loaded into the data warehouse

  - name: stg_smi__benchmarks
    description: >
      Daily index levels for two market benchmarks: the SMI Index (^SSMI), which
      tracks the 20 largest Swiss companies, and the S&P 500 (^GSPC), which tracks
      the 500 largest US companies. Used to compare individual stock performance
      against the broader market.
