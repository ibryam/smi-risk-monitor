version: 2

models:
  - name: stg_smi__daily_prices
    description: >
      Daily stock prices for all 20 SMI companies, cleaned and ready to use.
      Bad rows are removed here — for example rows where the price is missing or zero.
      All column names are standardised at this stage.
      Data is refreshed every weekday morning.

    columns:
      - name: date
        description: Trading date
        tests:
          - not_null

      - name: ticker
        description: Stock symbol (e.g. NESN.SW for Nestlé)
        tests:
          - not_null

      - name: company_name
        description: Company name (e.g. Nestlé, UBS, Roche)
        tests:
          - not_null

      - name: open_price
        description: Price at market open in CHF
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              strictly: true

      - name: high_price
        description: Highest price during the trading day in CHF
        tests:
          - not_null

      - name: low_price
        description: Lowest price during the trading day in CHF
        tests:
          - not_null

      - name: close_price
        description: Final price at market close in CHF
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              strictly: true

      - name: volume
        description: Number of shares traded during the day
        tests:
          - not_null

      - name: ingested_at
        description: When this record was saved to the database
        tests:
          - not_null

  - name: stg_smi__benchmarks
    description: >
      Daily price levels for the SMI Index and S&P 500, cleaned and ready to use.
      These are used to compare how individual stocks performed against the overall market.
