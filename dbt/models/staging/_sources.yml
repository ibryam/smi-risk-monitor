version: 2

sources:
  - name: smi_raw
    database: smi-risk-monitor
    schema: smi_raw
    description: Raw stock price data downloaded from Yahoo Finance. Nothing is changed at this stage.

    freshness:
      warn_after: {count: 3, period: day}
      error_after: {count: 7, period: day}
    loaded_at_field: ingested_at

    tables:
      - name: raw_benchmark_prices
        description: >
          Daily price data for the SMI Index and S&P 500.
          Stored separately from individual stocks because index data is used
          only for comparison — it is not a company you can invest in directly.
        columns:
          - name: date
            description: Trading date
          - name: ticker
            description: Index symbol (e.g. ^SSMI for the SMI Index)
          - name: index_name
            description: Index name (e.g. SMI Index, S&P 500)
          - name: close
            description: Index level at market close
          - name: ingested_at
            description: When this record was saved to the database

      - name: raw_daily_prices
        description: >
          Daily stock prices for all 20 SMI companies.
          One row per company per trading day.
          Updated every weekday morning by the automated pipeline.
        columns:
          - name: date
            description: Trading date
          - name: ticker
            description: Stock symbol used by Yahoo Finance (e.g. NESN.SW for Nestlé)
          - name: company_name
            description: Company name
          - name: open
            description: Price at market open in CHF
          - name: high
            description: Highest price of the day in CHF
          - name: low
            description: Lowest price of the day in CHF
          - name: close
            description: Price at market close in CHF
          - name: volume
            description: Number of shares traded during the day
          - name: ingested_at
            description: When this record was saved to the database
