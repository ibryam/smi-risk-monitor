version: 2

models:
  - name: mart_smi__stock_performance
    description: >
      The main table used by the dashboard. One row per stock per trading day.

      This table answers the question: how did each stock perform today,
      how risky is it, and how does it compare to the market?

      All 20 SMI stocks and both benchmarks (SMI Index, S&P 500) are included.
      Stocks are marked as row_type = 'stock', benchmarks as 'benchmark'.

      The normalized price makes it easy to compare stocks with very different
      price levels. For example, Givaudan trades around 3,500 CHF while Sandoz
      trades around 30 CHF. By starting both at 100 on the same date, you can
      directly compare their performance on one chart.

    columns:
      - name: date
        description: Trading date
        tests: [not_null]
      - name: ticker
        description: Stock symbol or index symbol
        tests: [not_null]
      - name: company_name
        description: Company or index name
      - name: sector
        description: Industry sector (e.g. Healthcare, Financials)
        tests: [not_null]
      - name: row_type
        description: Either 'stock' for SMI companies or 'benchmark' for market indices
      - name: normalized_price
        description: >
          Price rebased to 100 on the first available date.
          Makes it easy to compare stocks on the same chart regardless of their price.
        tests: [not_null]
      - name: volatility_30d
        description: How much the price moved over the last 30 days — higher means more risk
      - name: drawdown_from_52w_high_pct
        description: How far the stock is below its highest price in the last year
      - name: golden_cross
        description: Set to 1 on the day the short-term trend turns positive (bullish signal)
      - name: death_cross
        description: Set to 1 on the day the short-term trend turns negative (bearish signal)

  - name: mart_smi__risk_return_summary
    description: >
      A one-row-per-stock summary of risk and return across the full history.

      The key question in investing is: did this stock reward me enough for the
      risk I took? This table helps answer that by showing each stock's annual
      return alongside its average volatility.

      Stocks in the top-right of a risk/return chart delivered strong returns
      with manageable risk. Stocks in the bottom-right were volatile but did not
      go anywhere — a bad deal for investors.

    columns:
      - name: ticker
        description: Stock symbol
        tests: [not_null, unique]
      - name: company_name
        description: Company name
      - name: sector
        description: Industry sector
      - name: cagr_pct
        description: >
          Annual return from start to end of the available data.
          For example 12.5 means the stock grew 12.5% per year on average.
      - name: avg_volatility_30d
        description: Average daily risk level across the full period
      - name: max_drawdown_pct
        description: The worst drop from a peak seen during the full period
      - name: sharpe_proxy
        description: >
          Return divided by risk. Higher is better.
          A value above 1.0 means the stock returned more than one unit of gain
          for every unit of risk taken.
      - name: return_1m_pct
        description: Return over the last month
      - name: return_3m_pct
        description: Return over the last 3 months
      - name: return_ytd_pct
        description: Return since January 1st of this year
