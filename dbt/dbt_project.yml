name: smi_risk_monitor
version: "1.0.0"
config-version: 2

profile: smi_risk_monitor

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  smi_risk_monitor:
    staging:
      +materialized: view
      +schema: staging
      # Views avoid DML (MERGE) — keeps project within BigQuery free tier
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
